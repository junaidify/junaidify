<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 440" width="460" height="440">
  <defs>
    <linearGradient id="areaFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ea043" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="460" height="440" rx="14" fill="url(#bgGrad)"/>
  <rect x="0.5" y="0.5" width="459" height="439" rx="14" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Axes (cross pattern like the screenshot) -->
  <!-- Vertical axis (Code review top, Pull requests bottom) -->
  <line x1="230" y1="60" x2="230" y2="380" stroke="#2ea043" stroke-width="1.5" opacity="0.6"/>
  <!-- Horizontal axis (Commits left, Issues right) -->
  <line x1="50" y1="220" x2="410" y2="220" stroke="#2ea043" stroke-width="1.5" opacity="0.6"/>

  <!-- Short cross ticks at center -->
  <line x1="220" y1="220" x2="240" y2="220" stroke="#2ea043" stroke-width="2" opacity="0.8"/>
  <line x1="230" y1="210" x2="230" y2="230" stroke="#2ea043" stroke-width="2" opacity="0.8"/>

  <!-- Data polygon (Commits 59% left, Code review 14% top, Issues ~5% right, Pull requests 27% bottom) -->
  <polygon
    points="230,178 280,220 230,280 124,220"
    fill="url(#areaFill)"
    stroke="#2ea043"
    stroke-width="2"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Data points -->
  <!-- Code review (top) - 14% -->
  <circle cx="230" cy="178" r="5" fill="#0d1117" stroke="#2ea043" stroke-width="2.5"/>
  <circle cx="230" cy="178" r="2" fill="#2ea043"/>

  <!-- Issues (right) - small -->
  <circle cx="280" cy="220" r="5" fill="#0d1117" stroke="#2ea043" stroke-width="2.5"/>
  <circle cx="280" cy="220" r="2" fill="#2ea043"/>

  <!-- Pull requests (bottom) - 27% -->
  <circle cx="230" cy="280" r="5" fill="#0d1117" stroke="#2ea043" stroke-width="2.5"/>
  <circle cx="230" cy="280" r="2" fill="#2ea043"/>

  <!-- Commits (left) - 59% -->
  <circle cx="124" cy="220" r="5" fill="#0d1117" stroke="#2ea043" stroke-width="2.5"/>
  <circle cx="124" cy="220" r="2" fill="#2ea043"/>

  <!-- Labels -->
  <!-- Code review (top) -->
  <text x="230" y="52" text-anchor="middle" fill="#e6edf3" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600">Code review</text>
  <text x="230" y="38" text-anchor="middle" fill="#8b949e" font-family="Inter, -apple-system, sans-serif" font-size="11">14%</text>

  <!-- Issues (right) -->
  <text x="418" y="224" text-anchor="start" fill="#e6edf3" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600">Issues</text>

  <!-- Pull requests (bottom) -->
  <text x="230" y="400" text-anchor="middle" fill="#e6edf3" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600">Pull requests</text>
  <text x="230" y="414" text-anchor="middle" fill="#8b949e" font-family="Inter, -apple-system, sans-serif" font-size="11">27%</text>

  <!-- Commits (left) -->
  <text x="42" y="218" text-anchor="end" fill="#8b949e" font-family="Inter, -apple-system, sans-serif" font-size="11">59%</text>
  <text x="42" y="234" text-anchor="end" fill="#e6edf3" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600">Commits</text>
</svg>